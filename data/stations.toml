location = "ponte-caldelas"
name_es = "IES Ponte Caldelas"
name_en = "IES Ponte Caldelas"
latitude = 42.3897   # stand-in; Rural Hackers to confirm
longitude = -8.5031  # stand-in; Rural Hackers to confirm
status = "active"
# stand-in story; Rural Hackers to revise
story_es = """
El IES Ponte Caldelas es el instituto de la villa. Profesores, alumnos y familias \
contribuyen a una vista compartida del entorno escolar — los árboles del patio, los \
